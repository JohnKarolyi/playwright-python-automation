name: Playwright Tests with Allure

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Válaszd ki a futtatandó tesztcsomagot (HR indítás):'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - login
          - database
          - file_management

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Ensure Playwright browsers are installed
        run: npx playwright install --with-deps chromium

      - name: Run Tests
        run: |
          mkdir -p videos
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.test_suite }}" != "all" ]; then
            python -m pytest -m ${{ github.event.inputs.test_suite }} --alluredir=allure-results
          else
            python -m pytest tests --alluredir=allure-results
          fi
        continue-on-error: true

      - name: Save Test Videos (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: videos/
          retention-days: 7

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report Action from marketplace
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history